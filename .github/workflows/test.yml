name: Run Tests

on:
  pull_request:
    types: [ opened, synchronize ]

jobs:
  tests:
    name: Run Tests
    runs-on: windows-latest

    env:
      PYTHONIOENCODING: 'UTF-8'

    strategy:
      matrix:
        python-version: [ 3.12 ]

    steps:
      - name: Configure git
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global user.email "110257560+BnanZ0@users.noreply.github.com"
          git config --global user.name "RU"
          echo "action_state=yellow" >> $env:GITHUB_ENV
          echo $env:action_state

      - uses: actions/checkout@v7
        with:
          submodules: true
          lfs: true
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set UTF-8 encoding
        run: |
          set PYTHONIOENCODING=utf-8
          set PYTHONLEGACYWINDOWSSTDIO=utf-8
          echo PYTHONIOENCODING=utf-8 >> $GITHUB_ENV

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest discover -s tests -p "*test*.py" --top-level-directory . -v

  
